name: Live News Daemon

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: news-engine-daemon
  cancel-in-progress: true

jobs:
  run-live-daemon:
    runs-on: ubuntu-latest
    timeout-minutes: 320

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Execute Live News Stream
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python news_engine.py

      - name: Pull and Save State (Prevents Overwrite Conflicts)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git pull origin main --rebase || true
          git add state.json
          git commit -m "auto: update news state history [skip ci]" || exit 0
          git push
