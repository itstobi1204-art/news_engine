name: General News Daemon

on:
  schedule:
    - cron: '0 */5 * * *'  # Backup trigger every 5 hours
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: general-news-daemon
  cancel-in-progress: false

jobs:
  run-general-daemon:
    runs-on: ubuntu-latest
    timeout-minutes: 320

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Execute General News Stream
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python general_news_engine.py

      - name: Trigger Next Continuous Runner
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering next continuous general news runner..."
          gh workflow run "${{ github.workflow }}" || gh workflow run general_news_engine.yml || true

      - name: Pull and Save State
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git pull origin main --rebase || true
          git add state_general.json
          git commit -m "auto: update general news state history [skip ci]" || exit 0
          git push || true
